name: PR Agent

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  issue_comment:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent action step
        uses: SiyaoZheng/pr-agent@8f4d796ba4f0d251067eda12255e626e68867720
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Kimi K2.6 via the Anthropic-compatible coding endpoint.
          config.model: anthropic/K2.6
          config.fallback_models: '["anthropic/K2.6"]'
          config.custom_model_max_tokens: "128000"
          ANTHROPIC.KEY: ${{ secrets.KIMI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.KIMI_API_KEY }}
          ANTHROPIC_BASE_URL: https://api.kimi.com/coding
          LITELLM.EXTRA_HEADERS: '{"Authorization": "Bearer ${{ secrets.KIMI_API_KEY }}"}'
          LITELLM.EXTRA_BODY: '{"reasoning":{"enabled":true}}'

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'

      - name: Merge pull request
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            github.event.pull_request.draft == false
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh pr merge "$PR_URL" \
            --squash \
            --delete-branch \
            --match-head-commit "$PR_HEAD_SHA"

      - name: Close linked issues
        if: >-
          ${{
            success() &&
            github.event_name == 'pull_request' &&
            github.event.pull_request.draft == false
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          linked_issues=$(
            gh pr view "$PR_URL" \
              --json closingIssuesReferences \
              --jq '.closingIssuesReferences[].number' \
              2>/dev/null || true
          )

          if [ -z "$linked_issues" ]; then
            echo "No linked issues to close."
            exit 0
          fi

          while IFS= read -r issue_number; do
            [ -n "$issue_number" ] || continue
            gh issue close "$issue_number" \
              --comment "Closed automatically after merge of $PR_URL"
          done <<EOF
          $linked_issues
          EOF
